services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    environment:
      - MCP_SERVER_URL=http://mcp_server:8000/mcp
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/retail_bi
    depends_on:
      - mcp_server
      - postgres

  mcp_server:
    build:
      context: ./mcp_server
    ports:
      - "8001:8000"
    volumes:
      - ./mcp_server/app:/app/app
      - ./data:/data
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/retail_bi
    depends_on:
      - postgres

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=retail_bi
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  frontend_node_modules: