services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
    environment:
      - MCP_SERVER_URL=http://mcp_server:8000/mcp/
    depends_on:
      - mcp_server
      - postgres

  mcp_server:
    build:
      context: ./mcp_server
    ports:
      - "8001:8000"
    volumes:
      - ./mcp_server/app:/app/app
      - ./data:/data
      - ./mcp_server/scripts:/app/scripts
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/retail_bi
      - LEGACY_DATA_DIR=/data/legacy_exports
    depends_on:
      - postgres

  postgres:
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=retail_bi
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: